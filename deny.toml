# cargo-deny — License, vulnerability and source auditing
# Usage: cargo deny --all-features check all

# ============================================================================
# ADVISORIES
# ============================================================================
[advisories]
version = 2
yanked = "warn"
ignore = [
  # paste is unmaintained but deeply embedded via alloy-primitives; no drop-in replacement yet
  "RUSTSEC-2024-0436",
  # rustls-webpki name-constraint URI-name acceptance; transitively pulled by
  # reqwest's rustls backend. Waiting for a patched webpki release to land
  # before upgrading. No local usage of name constraints.
  "RUSTSEC-2026-0098",
  # rustls-webpki wildcard name-constraint acceptance; same upstream issue
  # and same dependency chain as RUSTSEC-2026-0098.
  "RUSTSEC-2026-0099",
]

# ============================================================================
# BANS
# ============================================================================
[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"
deny = [{ name = "openssl" }]
# hashbrown 0.16 (regress → typify → progenitor build-dep) vs 0.17 (indexmap → alloy)
skip = [
  { crate = "hashbrown@0.16", reason = "progenitor build-dep pins regress which needs hashbrown 0.16" },
]
# Whole-subtree skips: dev-dependencies that pin older transitive versions
# which we cannot upgrade without dropping the crate itself.
skip-tree = [
  # graphql-parser 0.4 pulls thiserror 1.x (used only for GraphQL schema
  # validation tests; no maintained fork uses thiserror 2.x yet).
  { crate = "graphql-parser@0.4.1" },
  # proptest → rusty-fork → tempfile → rustix → windows-sys 0.61 / targets 0.53.
  { crate = "proptest@1.10.0" },
  # rustls-platform-verifier → jni → windows-sys 0.45 / windows-targets 0.42.
  { crate = "rustls-platform-verifier@0.6.2" },
]

# ============================================================================
# LICENSES
# ============================================================================
[licenses]
version = 2
confidence-threshold = 0.8
private = { ignore = true }
unused-allowed-license = "warn"

allow = [
  "0BSD",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "CDDL-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MIT-0",
  "MPL-2.0",
  "OpenSSL",
  "Unicode-3.0",
  "Unlicense",
  "WTFPL",
  "Zlib",
  "LicenseRef-rustls-webpki",
]

exceptions = []

[[licenses.clarify]]
name = "unicode-ident"
version = "*"
expression = "(MIT OR Apache-2.0) AND Unicode-DFS-2016"
license-files = [{ path = "LICENSE-UNICODE", hash = 0x3fb01745 }]

[[licenses.clarify]]
name = "ring"
version = "*"
expression = "OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[[licenses.clarify]]
name = "rustls-webpki"
expression = "LicenseRef-rustls-webpki"
license-files = [{ path = "LICENSE", hash = 0x001c7e6c }]

# ============================================================================
# SOURCES
# ============================================================================
[sources]
unknown-registry = "warn"
unknown-git = "deny"
allow-git = []
