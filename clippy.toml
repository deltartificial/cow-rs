# ==============================================================================
# STACK AND MEMORY THRESHOLDS
# ==============================================================================

# Limit large types on the stack (bytes)
too-large-for-stack = 128

# Force pass-by-reference for types larger than 128 bytes
pass-by-value-size-limit = 128

# Force explicit Copy bound for generic types with size > 32 bytes
trivial-copy-size-limit = 32

# Prevent huge stack arrays (warn for arrays > 8KB)
array-size-threshold = 8192

# ==============================================================================
# COMPLEXITY THRESHOLDS (Force simpler code)
# ==============================================================================

# Force simpler function logic (default: 25, Vulcan: 15)
cognitive-complexity-threshold = 15

# Force simpler type signatures (default: 250, Vulcan: 100)
type-complexity-threshold = 100

# Force fewer function parameters (default: 7, Vulcan: 5)
too-many-arguments-threshold = 5

# Force shorter functions (default: 100, Vulcan: 75)
too-many-lines-threshold = 75

# ==============================================================================
# NAMING RESTRICTIONS
# ==============================================================================

# Reject 1-char identifiers (except common loop/math vars)
min-ident-chars-threshold = 2
allowed-idents-below-min-chars = ["i", "j", "k", "x", "y", "z", "w", "h", "n", "m", "_"]

# ==============================================================================
# TEST ALLOWANCES
# ==============================================================================

# Allow dbg! macro in test code
allow-dbg-in-tests = true

# Allow unwrap/expect/panic in tests (but NOT in src/)
allow-unwrap-in-tests = true
allow-expect-in-tests = true
allow-panic-in-tests = true

# ==============================================================================
# DOCUMENTATION
# ==============================================================================

# Valid identifiers for doc_markdown lint
doc-valid-idents = [
  "P2P",
  "IPv4",
  "IPv6",
  "KiB",
  "MiB",
  "GiB",
  "TiB",
  "WebSocket",
  "WebSockets",
  "MessagePack",
  "EVM",
]

# ==============================================================================
# SEMVER AND BREAKING CHANGES
# ==============================================================================

# Allow breaking exported API during development
avoid-breaking-exported-api = false

# Enforce consistent struct field initialization order
check-inconsistent-struct-field-initializers = true

# Flag commented-out code
lint-commented-code = true

# ==============================================================================
# INTERIOR MUTABILITY
# ==============================================================================

# Types with interior mutability to ignore
ignore-interior-mutability = ["bytes::Bytes"]

# ==============================================================================
# DISALLOWED MACROS
# ==============================================================================

# Disallow direct print macros — enforce tracing usage
disallowed-macros = [
  { path = "std::print", reason = "use `tracing` macros instead" },
  { path = "std::eprint", reason = "use `tracing` macros instead" },
  { path = "std::println", reason = "use `tracing` macros instead" },
  { path = "std::eprintln", reason = "use `tracing` macros instead" },
]

# ==============================================================================
# DISALLOWED TYPES
# ==============================================================================

# Enforce faster alternatives to std collections and sync primitives
disallowed-types = [
  # HashMap/HashSet: use faster alternatives
  { path = "std::collections::HashMap", reason = "use `foldhash::HashMap` or `rustc_hash::FxHashMap` for better performance" },
  { path = "std::collections::HashSet", reason = "use `foldhash::HashSet` or `rustc_hash::FxHashSet` for better performance" },

  # LinkedList: almost always wrong choice (cache-unfriendly, allocation overhead)
  { path = "std::collections::LinkedList", reason = "use `Vec` or `VecDeque` instead - LinkedList has poor cache locality and rarely justified" },

  # Mutex/RwLock: use parking_lot for better performance
  { path = "std::sync::Mutex", reason = "use `parking_lot::Mutex` for 1.5x better performance and no poisoning" },
  { path = "std::sync::RwLock", reason = "use `parking_lot::RwLock` for 5x better performance and no poisoning" },
]

# ==============================================================================
# DISALLOWED METHODS
# ==============================================================================

# Enforce explicit error handling
disallowed-methods = [
  { path = "std::env::var", reason = "use `std::env::var_os` with explicit error handling or a config module" },
  { path = "std::mem::drop", reason = "use `_ = expr` to explicitly discard a #[must_use] value; use a scope block to drop a guard early" },
  { path = "core::option::Option::unwrap_or", reason = "use `map_or`, `if let`/`let-else`, or propagate with `?`" },
  { path = "core::result::Result::unwrap_or", reason = "use `map_or`, `if let`/`let-else`, or propagate with `?`" },
]
